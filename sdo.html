<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Система дистанционного обучения — Центр образования №159</title>
    <style>
        /* ==================== ОБЩИЕ СТИЛИ И ПОЛНОЭКРАННЫЙ ФОН ==================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            overflow: hidden; /* Исключаем появление полос прокрутки */
            /* Затемнение + фоновое изображение на весь экран */
            background: linear-gradient(rgba(0, 0, 0, 0.4), rgba(0, 0, 0, 0.4)), 
                        url('фон.png') no-repeat center center;
            background-size: 100% 100%;
        }

        /* Литой монолитный wrapper на весь экран без скруглений и теней */
        .site-wrapper {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: transparent !important;
        }

               /* ==================== НАСЫЩЕННАЯ ЖЕЛТАЯ ШАПКА ==================== */
        .header {
            width: 100%;
            background-color: #f7e443; /* Тулбар теперь жёлтый */
            padding: 25px 60px;
        }

        .nav-container {
            display: flex;
            align-items: center;
            gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
            width: 100%;
        }

        /* Стрелка назад */
        .back-arrow {
            display: flex;
            align-items: center;
            color: #333; /* Тёмный цвет для контраста с жёлтым */
            text-decoration: none;
            font-size: 1.6rem;
            margin-right: 5px;
            cursor: pointer;
            font-weight: bold;
        }

        /* Кнопка Главная */
        .nav-link-main {
            color: #333; /* Тёмный цвет для контраста с жёлтым */
            text-decoration: none;
            font-weight: 600;
            font-size: 1.3rem;
            cursor: pointer;
        }

        /* Полупрозрачный тёмный поиск в шапке */
        .search-container-header {
            margin-left: auto;
            display: flex;
        }

        .search-bar {
            display: flex;
            align-items: center;
            background-color: rgba(0, 0, 0, 0.08);
            border-radius: 24px;
            padding: 8px 25px;
            border: 1px solid rgba(0, 0, 0, 0.15);
        }

        .search-bar input {
            border: none;
            background: transparent;
            outline: none;
            color: #333;
            padding: 5px;
            font-size: 1.1rem;
            width: 260px;
        }

        .search-bar input::placeholder {
            color: #666;
        }

        .search-btn {
            border: none;
            background: transparent;
            color: #333;
            cursor: pointer;
            display: flex;
            align-items: center;
        }



        /* ==================== ОСНОВНОЙ КОНТЕНТ НА ВЕСЬ ЭКРАН ==================== */
        .main-container {
            flex: 1; 
            background: transparent !important; /* Убираем промежуточный серый фон */
            padding: 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .content-inner-max {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            height: 100%;
        }

        /* Оранжево-желтый градиент фона из макета для внутренней карточки */
        .sdo-card-layout {
            background: linear-gradient(to bottom, #f3b15a 0%, #ff8303 100%); 
            padding: 50px 60px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: auto 0;
        }

        /* Главный заголовок страницы */
        .page-title {
            font-size: 2.6rem;
            color: #222;
            text-align: center;
            margin-bottom: 35px;
            font-weight: 400;
            -webkit-text-stroke: 0.5px white;
            text-shadow: 1px 1px 0 white;
        }

        /* Форма авторизации */
        .login-card {
            background: white;
            border-radius: 24px;
            padding: 40px 50px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
            text-align: center;
        }

        .login-card h3 {
            font-size: 1.4rem;
            color: #000;
            margin-bottom: 25px;
            font-weight: 500;
        }

        /* Поля ввода в одну строку */
        .input-row {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
        }

        .input-field {
            flex: 1;
            border: 1px solid #777;
            padding: 10px 14px;
            font-size: 1rem;
            outline: none;
            color: #333;
        }

        /* Синяя кнопка Войти */
        .btn-submit {
            background-color: #00b0ff;
            color: white;
            border: none;
            border-radius: 24px;
            padding: 12px 50px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: background-color 0.2s;
            margin-bottom: 15px;
        }

        .btn-submit:hover {
            background-color: #0091ea;
        }

        /* Мелкая надпись */
        .hint-text {
            font-size: 0.75rem;
            color: #444;
            margin-bottom: 15px;
        }

        /* Кнопка Госуслуг */
        .gosuslugi-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: #eef2f7;
            border-radius: 15px;
            padding: 10px 30px;
            text-decoration: none;
            border: 1px solid #d1d8e0;
            transition: background-color 0.2s;
        }

        .gosuslugi-btn:hover {
            background: #e2e8f0;
        }

        .gos-logo {
            font-size: 1.4rem;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .gos-blue { color: #0c54a0; }
        .gos-red { color: #ee3124; }

        /* Подвал навигации */
        .footer-hint {
            text-align: center;
            width: 100%;
        }

        .footer-hint a {
            color: rgba(255, 255, 255, 0.6);
            text-decoration: none;
            font-size: 1.1rem;
            transition: color 0.3s;
            cursor: pointer;
        }

        .footer-hint a:hover {
            color: #fff;
            text-decoration: underline;
        }

        /* ==================== АДАПТИВНОСТЬ ==================== */
        @media (max-width: 768px) {
            body { overflow-y: auto; height: auto; }
            .header { padding: 20px; }
            .main-container { padding: 40px 20px; }
            .page-title { font-size: 1.8rem; }
            .input-row { flex-direction: column; gap: 12px; }
            .login-card { padding: 25px 20px; }
            .sdo-card-layout { padding: 30px 20px; }
            .search-container-header { display: none !important; }
        }
    </style>
</head>
<body>

    <div class="site-wrapper">
        <!-- Шапка / Навигация -->
        <header class="header">
            <div class="nav-container">
                <a href="index.html" class="back-arrow">&#8592;</a>
                <a href="index.html" class="nav-link-main">Главная</a>
                
                <!-- Зеленый поиск справа -->
                <div class="search-container-header">
                    <div class="search-bar">
                        <input type="text" placeholder="Введите текст...">
                        <button class="search-btn" aria-label="Поиск">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5">
                                <circle cx="11" cy="11" r="8"></circle>
                                <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                            </svg>
                        </button>
                    </div>
                </div>
            </div>
        </header>

        <!-- Полноэкранный контейнер контента -->
        <main class="main-container">
            <div class="content-inner-max">
                
                <div class="sdo-card-layout">
                    <!-- Заголовок страницы -->
                    <h2 class="page-title">Система дистанционного обучения</h2>

                    <!-- Карточка Входа в систему -->
                    <div class="login-card">
                        <h3>Вход в систему</h3>
                        
                        <form action="#" method="POST">
                            <div class="input-row">
                                <input type="text" class="input-field" placeholder="Логин" required>
                                <input type="password" class="input-field" placeholder="Пароль" required>
                            </div>
                            
                           <a href="https://sch159digital.ru/login/index.php" class="btn-submit" style="text-decoration: none; display: inline-block; text-align: center;">Войти</a>
</form>

<p class="hint-text">если не получается войти через Логин, воспользуйтесь:</p>

<!-- Вход через Госуслуги -->
<a href="https://gosuslugi.ru" target="_blank" class="gosuslugi-btn">
    <span class="gos-logo"><span class="gos-blue">гос</span><span class="gos-red">услуги</span></span>
